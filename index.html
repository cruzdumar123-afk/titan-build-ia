<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Titan Build IA</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #1e3c72;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      background: #1e3c72;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .item {
      border-bottom: 1px solid #ccc;
      margin-top: 10px;
      padding-bottom: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>🏗️ Titan Build IA</h1>
  <p>Filtramos clientes reales para constructores</p>
</header>

<div class="container">

  <div class="card">
    <h2>Solicita tu proyecto</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">
    <input id="ciudad" placeholder="Ciudad">

    <select id="tipo">
      <option>Remodelación</option>
      <option>Casa nueva</option>
      <option>Reparación</option>
    </select>

    <input type="number" id="tamano" placeholder="Tamaño (m²)">
    <input type="number" id="presupuesto" placeholder="Presupuesto (COP)">

    <select id="urgencia">
      <option>Alta</option>
      <option>Media</option>
      <option>Baja</option>
    </select>

    <button onclick="generar()">🧠 Analizar Proyecto</button>

    <div id="resultado"></div>

    <button onclick="enviar()" style="margin-top:15px;">
      📤 Enviar al constructor
    </button>
  </div>

  <div class="card">
    <h2>📋 Clientes registrados</h2>
    <div id="lista"></div>
  </div>

</div>

<script>

let solicitudes = JSON.parse(localStorage.getItem("solicitudes")) || [];
let ultimoProyecto = null;

// 🧠 ANALIZAR PROYECTO
function generar() {
  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;
  const ciudad = document.getElementById("ciudad").value;
  const tipo = document.getElementById("tipo").value;
  const tamano = document.getElementById("tamano").value;
  const presupuesto = document.getElementById("presupuesto").value;

  if (!nombre || !telefono || !tamano || !presupuesto) {
    alert("Completa todos los campos");
    return;
  }

  let estimacion = tamano * 800000;

  let nivel = "";
  let estado = "";
  let recomendacion = "";

  if (presupuesto >= estimacion) {
    nivel = "Alto";
    estado = "🟢 Cliente ideal";
    recomendacion = "Proyecto viable con buen presupuesto.";
  } else if (presupuesto >= estimacion * 0.7) {
    nivel = "Medio";
    estado = "🟡 Cliente potencial";
    recomendacion = "Se puede ajustar el proyecto.";
  } else {
    nivel = "Bajo";
    estado = "🔴 No viable";
    recomendacion = "Presupuesto insuficiente.";
  }

  const proyecto = {
    nombre,
    telefono,
    ciudad,
    tipo,
    tamano,
    presupuesto,
    nivel,
    estado
  };

  ultimoProyecto = proyecto;

  document.getElementById("resultado").innerHTML = `
    <p><b>${nombre}</b> (${ciudad})</p>
    <p>${tipo} - ${tamano} m²</p>
    <p>$${Number(presupuesto).toLocaleString()} COP</p>

    <hr>

    <p><b>${estado}</b></p>
    <p>${recomendacion}</p>
  `;
}

// 📤 ENVIAR AL CONSTRUCTOR (EMAIL REAL)
function enviar() {
  if (!ultimoProyecto) {
    alert("Primero analiza un proyecto");
    return;
  }

  if (ultimoProyecto.nivel === "Bajo") {
    alert("❌ Cliente no viable");
    return;
  }

  const mensaje = `
Nuevo cliente desde Titan Build IA:

Nombre: ${ultimoProyecto.nombre}
Teléfono: ${ultimoProyecto.telefono}
Ciudad: ${ultimoProyecto.ciudad}

Proyecto: ${ultimoProyecto.tipo}
Tamaño: ${ultimoProyecto.tamano} m²
Presupuesto: $${Number(ultimoProyecto.presupuesto).toLocaleString()} COP

Clasificación: ${ultimoProyecto.estado}
  `;

  const correo = "cruzdumar123@gmail.com"; // 🔥 CAMBIA ESTO

  const link = `mailto:${correo}?subject=Nuevo Cliente Titan Build IA&body=${encodeURIComponent(mensaje)}`;

  // Guardar también
  solicitudes.push(ultimoProyecto);
  localStorage.setItem("solicitudes", JSON.stringify(solicitudes));

  mostrarLista();

  window.location.href = link;
}

// 📋 MOSTRAR CLIENTES
function mostrarLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  solicitudes.forEach((s) => {
    lista.innerHTML += `
      <div class="item">
        <b>${s.nombre}</b> - ${s.ciudad}<br>
        📞 ${s.telefono}<br>
        ${s.tipo} - ${s.tamano} m²<br>
        $${Number(s.presupuesto).toLocaleString()} COP<br>
        ${s.estado}
      </div>
    `;
  });
}

mostrarLista();

</script>

</body>
</html>
