<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ato</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 400px;
  min-height: 100vh;
  background: linear-gradient(180deg, #020617, #0f172a);
  color: white;
}

header {
  text-align: center;
  padding: 30px;
}

header p {
  color: #94a3b8;
}

.container {
  padding: 15px;
}

.card {
  background: rgba(30,41,59,0.8);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.accept {
  background: #22c55e;
}

.disabled {
  background: gray;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

.hidden { display: none; }

.badge {
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
}

.verde { background: green; }
.amarillo { background: orange; }
.rojo { background: red; }

.asignado {
  background: #1d4ed8;
}
</style>
</head>

<body>

<div class="app">

<header>
  <h1>Ato</h1>
  <p>Construir nunca fue tan fácil.</p>
</header>

<div class="container">

<div id="inicio" class="card">
  <h3>¿Quién eres?</h3>
  <button onclick="mostrarCliente()">👤 Cliente</button>
  <button onclick="mostrarConstructor()">🏗️ Constructor</button>
</div>

<div id="cliente" class="card hidden">
  <h3>Nuevo proyecto</h3>

  <input id="nombre" placeholder="Nombre">
  <input id="telefono" placeholder="Teléfono">
  <input id="ciudad" placeholder="Ciudad">

  <select id="tipo">
    <option>Remodelación</option>
    <option>Casa nueva</option>
    <option>Reparación</option>
  </select>

  <input id="tamano" type="number" placeholder="Tamaño m²">
  <input id="presupuesto" type="number" placeholder="Presupuesto">

  <select id="urgencia">
    <option>Alta</option>
    <option>Media</option>
    <option>Baja</option>
  </select>

  <button onclick="generar()">Analizar proyecto</button>

  <div id="resultado"></div>

  <button onclick="guardar()">Enviar proyecto</button>
  <button onclick="volver()">⬅ Volver</button>
</div>

<div id="constructor" class="card hidden">
  <h3>Proyectos disponibles</h3>
  <div id="lista"></div>
  <button onclick="volver()">⬅ Volver</button>
</div>

</div>

</div>

<script>

let proyectos = JSON.parse(localStorage.getItem("proyectos")) || [];
let actual = null;

const inicio = document.getElementById("inicio");
const cliente = document.getElementById("cliente");
const constructorDiv = document.getElementById("constructor");

function guardarStorage() {
  localStorage.setItem("proyectos", JSON.stringify(proyectos));
}

function mostrarCliente() {
  inicio.classList.add("hidden");
  cliente.classList.remove("hidden");
}

function mostrarConstructor() {
  inicio.classList.add("hidden");
  constructorDiv.classList.remove("hidden");
  mostrarLista();
}

function volver() {
  inicio.classList.remove("hidden");
  cliente.classList.add("hidden");
  constructorDiv.classList.add("hidden");
}

function generar() {
  let nombre = document.getElementById("nombre").value;
  let telefono = document.getElementById("telefono").value;
  let ciudad = document.getElementById("ciudad").value;
  let tipo = document.getElementById("tipo").value;
  let tamano = document.getElementById("tamano").value;
  let presupuesto = document.getElementById("presupuesto").value;

  if (!nombre || !telefono || !tamano || !presupuesto) {
    alert("Completa todos los campos");
    return;
  }

  let score = presupuesto / tamano;

  let estado = "";
  let clase = "";

  if (score > 800000) {
    estado = "Ideal";
    clase = "verde";
  } else if (score > 500000) {
    estado = "Potencial";
    clase = "amarillo";
  } else {
    estado = "No viable";
    clase = "rojo";
  }

  actual = {
    nombre,
    telefono,
    ciudad,
    tipo,
    tamano,
    presupuesto,
    estado,
    clase,
    score,
    asignado: false
  };

  document.getElementById("resultado").innerHTML = `
    <p><b>${estado}</b></p>
    <span class="badge ${clase}">${estado}</span>
  `;
}

function guardar() {
  if (!actual) return alert("Analiza primero");

  proyectos.push(actual);
  guardarStorage();

  alert("Proyecto enviado");
}

function aceptar(index) {
  proyectos[index].asignado = true;
  guardarStorage();
  mostrarLista();
}

function mostrarLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  proyectos.sort((a,b)=>b.score-a.score);

  proyectos.forEach((p, i) => {
    lista.innerHTML += `
      <div>
        <b>${p.nombre}</b> - ${p.ciudad}<br>
        ${p.tipo} - ${p.tamano} m²<br>
        $${p.presupuesto}<br>

        <span class="badge ${p.asignado ? "asignado" : p.clase}">
          ${p.asignado ? "Asignado" : p.estado}
        </span>

        ${
          !p.asignado
          ? `<button class="accept" onclick="aceptar(${i})">Aceptar proyecto</button>`
          : `<button class="disabled">Ya asignado</button>`
        }
      </div>
      <hr>
    `;
  });
}

</script>

</body>
</html>
