<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Titan Build IA</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      margin: 0;
      padding: 20px;
    }

    .app {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    input, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      background: #2a5298;
      color: white;
      cursor: pointer;
    }

    .result, .lista {
      margin-top: 20px;
      padding: 10px;
      background: #f4f4f4;
      border-radius: 10px;
    }

    .item {
      border-bottom: 1px solid #ccc;
      margin-bottom: 10px;
      padding-bottom: 10px;
    }

    img {
      width: 100%;
      margin-top: 5px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="app">
  <h1>🏗️ Titan Build IA</h1>

  <input id="nombre" placeholder="Nombre del cliente">
  <input id="telefono" placeholder="Teléfono">

  <label>Tipo de proyecto</label>
  <select id="tipo">
    <option>Remodelación</option>
    <option>Casa nueva</option>
    <option>Reparación</option>
  </select>

  <input type="number" id="tamano" placeholder="Tamaño (m²)">
  <input type="number" id="presupuesto" placeholder="Presupuesto (COP)">

  <label>Urgencia</label>
  <select id="urgencia">
    <option>Alta</option>
    <option>Media</option>
    <option>Baja</option>
  </select>

  <label>Subir fotos</label>
  <input type="file" id="foto" accept="image/*">

  <button onclick="generar()">Generar Cotización</button>

  <div id="resultado" class="result" style="display:none;"></div>

  <div class="lista">
    <h3>📋 Clientes registrados</h3>
    <div id="lista"></div>
  </div>
</div>

  const presupuesto = document.getElementById("presupuesto").value;

  recomendacion = "Proyecto viable con buen presupuesto.";
}

  estado = "🟡 Cliente potencial";

}
else {
  nivel = "Bajo";
  estado = "🔴 No viable";
  recomendacion = "El presupuesto es demasiado bajo para el tamaño del proyecto.";
 
}

function mostrarLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  solicitudes.forEach((s) => {
    lista.innerHTML += `
      <div class="item">
        <b>${s.nombre}</b><br>
        📞 ${s.telefono}<br>
        ${s.tipo} - ${s.tamano} m²<br>
        $${Number(s.presupuesto).toLocaleString()} COP<br>
        Nivel: ${s.nivel}
        ${s.fotoURL ? `<img src="${s.fotoURL}">` : ""}
      </div>
    `;
  });
}

mostrarLista();
</script>

</body>
</html>
